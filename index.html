<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asfaflix Web Player</title>
    <!-- Video.js Styles -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .video-container {
            width: 80%;
            max-width: 800px;
            aspect-ratio: 16/9;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video 
            id="live-stream" 
            class="video-js vjs-default-skin vjs-big-play-centered" 
            controls 
            preload="auto" 
            width="100%" 
            height="100%"
            data-setup='{}'>
            <!-- Points directly to your Vercel PHP script endpoint -->
            <source src="/api/stream.php" type="application/x-mpegURL">
            Your browser does not support HTML5 video.
        </video>
    </div>

    <!-- Video.js Script -->
    <script src="https://vjs.zencdn.net/8.10.0/video.js"></script>
</body>
</html>
