<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASFA Live</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/SRgsPFyg/image.png">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="content-wrapper">
            <div id="player-container">
                <video id="live-tv-player" controls preload="auto" controlslist="nodownload">
                    Your browser does not support the video tag.
                </video>
            </div>
            
            <div class="channel-section">
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="Search channels...">
                </div>
                <div class="channel-list" id="channel-list"></div>
                <div class="footer">
                    <a href="updates.html" target="_blank">for more updates</a>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
